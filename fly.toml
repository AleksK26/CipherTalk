app = "ciphertalk-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.backend"

[env]
  # DB path on the persistent volume
  WEBAPI_DB_FILENAME = "/data/ciphertalk.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "db_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
